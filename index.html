<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cutsie Planet Explorer</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/"
        }
      }
    </script>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div id="app">
      <div class="hud">
        <h1>Cutsie Planet Explorer</h1>
        <p>Drag to orbit. Scroll to zoom. Use previous/next or double-click a planet to focus.</p>
      </div>

      <aside class="planet-panel" aria-label="Planet selector">
        <h2>Planets</h2>
        <div class="planet-nav" aria-label="Sequential planet navigation">
          <button id="prev-planet" type="button">← Previous</button>
          <button id="next-planet" type="button">Next →</button>
        </div>
        <div id="planet-buttons" class="planet-buttons"></div>
        <article class="planet-details">
          <h3 id="planet-name">Select a planet</h3>
          <p id="planet-description">Pick one of the 8 planets to zoom in and learn a quick fact.</p>
        </article>
      </aside>

      <canvas id="scene"></canvas>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
